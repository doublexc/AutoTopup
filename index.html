<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเติมเงินอัตโนมัติ</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #27ae60; }
        #qr-section { margin-top: 25px; display: none; border-top: 2px dashed #eee; padding-top: 20px; }
        .amount-display { font-size: 28px; font-weight: bold; color: #e74c3c; margin: 10px 0; }
        .warning { color: #7f8c8d; font-size: 13px; margin-top: 10px; font-weight: bold; }
        #loader { display: none; margin: 20px auto; border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h2>เติมเงินเข้าแอป</h2>
    <input type="text" id="userId" placeholder="กรอก ID ผู้ใช้ของคุณ" required>
    <input type="number" id="amount" placeholder="จำนวนเงิน" required>
    <button id="btn-submit" onclick="requestPayment()">สร้างรายการเติมเงิน</button>
    
    <div id="loader"></div>

    <div id="qr-section">
        <p>กรุณาโอนเงินจำนวน</p>
        <div class="amount-display" id="final-amount">0.00</div>
        <p>บาท</p>
        <canvas id="qrcode"></canvas>
        <p class="warning">** ต้องโอนยอดที่มีเศษสตางค์ให้ตรงเป๊ะ **<br>เพื่อให้ระบบเติมเงินอัตโนมัติ</p>
    </div>
</div>

<script>
    // --- ฟังก์ชันสร้าง PromptPay Payload (เก็บไว้ได้ เพราะเป็น logic การคำนวณรหัส ไม่ใช่ข้อมูลลับ) ---
    function generatePromptPayPayload(target, amount) {
        function format(id, value) { return id + ("00" + value.length).slice(-2) + value; }
        target = target.replace(/[^0-9]/g, "");
        let targetType = target.length >= 13 ? "03" : "01";
        if (target.length === 10) target = "0066" + target.substring(1);
        let data = [
            format("00", "01"), format("01", "12"),
            format("29", format("00", "A000000677010111") + format(targetType, target)),
            format("58", "TH"), format("53", "764"),
            format("54", amount.toFixed(2)), format("63", "0000")
        ].join("");
        function crc16(data) {
            let crc = 0xFFFF;
            for (let i = 0; i < data.length; i++) {
                crc ^= data.charCodeAt(i) << 8;
                for (let j = 0; j < 8; j++) crc = (crc & 0x8000) ? (crc << 1) ^ 0x1021 : crc << 1;
            }
            return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, "0");
        }
        return data.substring(0, data.length - 4) + crc16(data.substring(0, data.length - 4));
    }

    async function requestPayment() {
        const id = document.getElementById('userId').value;
        const amount = document.getElementById('amount').value;
        const loader = document.getElementById('loader');
        const qrSection = document.getElementById('qr-section');
        const btn = document.getElementById('btn-submit');

        if(!id || !amount) return alert("กรุณากรอกข้อมูลให้ครบ");

        loader.style.display = 'block';
        qrSection.style.display = 'none';
        btn.disabled = true;

        try {
            // *** สำคัญ: เปลี่ยน URL นี้ให้เป็น URL ของ Worker ที่คุณกด Deploy เสร็จแล้ว ***
            const WORKER_URL = 'https://aged-silence-89af.xxxcopyxx.workers.dev'; 

            const response = await fetch(WORKER_URL, { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id, amount: parseFloat(amount) })
            });
            const data = await response.json();

            if(data.status === "success") {
                const finalAmount = data.finalAmount;
                document.getElementById('final-amount').innerText = finalAmount.toFixed(2);
                
                // ใช้ค่า promptpayId ที่ส่งกลับมาจาก Worker แบบชั่วคราว
                const payload = generatePromptPayPayload(data.promptpayId, finalAmount);
                
                // สร้าง QR Code ลงบน Canvas
                QRCode.toCanvas(document.getElementById('qrcode'), payload, { width: 250 }, (error) => {
                    loader.style.display = 'none';
                    btn.disabled = false;
                    if (error) {
                        alert("QR Drawing Error: " + error);
                    } else {
                        qrSection.style.display = 'block';
                    }
                });
            } else {
                alert("Server Error: " + data.message);
                loader.style.display = 'none';
                btn.disabled = false;
            }
        } catch (err) {
            alert("Connection Error: " + err.message);
            loader.style.display = 'none';
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
